<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TAKI GAME</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#111,#333);
color:white;
text-align:center;
}


.box{
max-width:600px;
margin:20px auto;
background:#222;
padding:20px;
border-radius:30px;
box-shadow:0 0 30px black;
}


button{
padding:15px 35px;
border:0;
border-radius:25px;
font-size:20px;
cursor:pointer;
}


.cards{
display:flex;
justify-content:center;
gap:8px;
flex-wrap:wrap;
}


.card{

width:55px;
height:85px;
background:white;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
cursor:pointer;

}


.red{color:red}
.blue{color:blue}
.green{color:green}
.yellow{color:#b88600}


.back{
background:#111;
color:white;
}


.bot{

background:#333;
padding:10px;
border-radius:20px;
margin:10px;

}


#game{
display:none;
}


.center{

display:flex;
justify-content:center;
gap:30px;

}


</style>

</head>


<body>


<div class="box" id="home">

<h1>🃏 TAKI GAME</h1>

<p>טאקי מול 2 בוטים</p>

<button onclick="start()">
התחל משחק
</button>

</div>





<div class="box" id="game">


<h1>🃏 TAKI</h1>



<div class="bot">

<h2>🤖 בוט 1</h2>

<div id="bot1" class="cards"></div>

</div>




<div class="bot">

<h2>🤖 בוט 2</h2>

<div id="bot2" class="cards"></div>

</div>




<div class="center">


<div>

<p>קופה</p>

<div class="card back" onclick="takeCard()">
🃏
</div>

<p id="count"></p>

</div>



<div>

<p>קלף אחרון</p>

<div id="last" class="card"></div>

</div>



</div>





<h2>הקלפים שלך</h2>


<div id="player" class="cards"></div>



<h2 id="msg">
התור שלך
</h2>



<button onclick="start()">
משחק חדש
</button>


</div>







<script>


let colors=[
"red",
"blue",
"green",
"yellow"
];


let player=[];

let bot1=[];

let bot2=[];

let deck=[];

let last;




function newCard(){

return{

num:Math.floor(Math.random()*9)+1,

color:
colors[Math.floor(Math.random()*4)]

};

}





function createDeck(){

deck=[];


for(let i=0;i<80;i++){

deck.push(newCard());

}


}





function start(){


document.getElementById("home").style.display="none";

document.getElementById("game").style.display="block";



createDeck();



player=[];

bot1=[];

bot2=[];



for(let i=0;i<7;i++){

player.push(deck.pop());

bot1.push(deck.pop());

bot2.push(deck.pop());

}



last=deck.pop();



draw();


}





function draw(){



let p=document.getElementById("player");

p.innerHTML="";



player.forEach((c,i)=>{


let d=document.createElement("div");


d.className="card "+c.color;


d.innerHTML=c.num;


d.onclick=()=>play(i);


p.appendChild(d);


});



showBot("bot1",bot1);

showBot("bot2",bot2);



let l=document.getElementById("last");


l.className="card "+last.color;


l.innerHTML=last.num;



document.getElementById("count").innerHTML=
"קלפים: "+deck.length;


}




function showBot(id,bot){


let area=document.getElementById(id);


area.innerHTML="";


bot.forEach(()=>{


let d=document.createElement("div");


d.className="card back";


d.innerHTML="🃏";


area.appendChild(d);


});


}





function takeCard(){


if(deck.length==0){

createDeck();

}



player.push(deck.pop());



draw();



document.getElementById("msg").innerHTML=
"הבוטים משחקים...";



setTimeout(botTurn,1000);


}





function play(i){


let c=player[i];



if(c.color==last.color ||
c.num==last.num){


last=c;


player.splice(i,1);



draw();



if(player.length==0){

document.getElementById("msg").innerHTML=
"🎉 ניצחת!";

return;

}



setTimeout(botTurn,1000);


}


else{


document.getElementById("msg").innerHTML=
"אי אפשר לשים את הקלף הזה";


}



}





function botTurn(){


computer(bot1);


draw();



setTimeout(()=>{


computer(bot2);


draw();



document.getElementById("msg").innerHTML=
"התור שלך";



},1000);



}




function computer(bot){



let move=bot.findIndex(c=>

c.color==last.color ||

c.num==last.num

);



if(move!=-1){


last=bot[move];


bot.splice(move,1);



}


else{


if(deck.length==0){

createDeck();

}


bot.push(deck.pop());


}



}



</script>


</body>

</html>
